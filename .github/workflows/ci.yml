name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      # Guards the awkward cfg cross-section: with `default = []` this is the
      # same as the default build today, but it ensures a future `default`
      # member can't hide a `--no-default-features` breakage. The (os ×
      # default/proxy) matrix already covers linux-no-proxy and macos-proxy.
      - name: cargo clippy (no default features)
        run: cargo clippy --no-default-features --all-targets -- -D warnings

      - name: cargo clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings

      # Linux Phase 1 sandbox tests use Landlock + seccomp — ubuntu-latest's
      # kernel is Landlock-capable, so enforcement runs for real with no
      # special provisioning. Phase 3 (bwrap netns + transparent proxy
      # bridge) DOES require bwrap + unprivileged user namespaces +
      # (on Ubuntu 24.04) the AppArmor userns-restriction relaxed. The two
      # steps below provision that — Linux runners only.
      - name: install bubblewrap + python3 + curl (Linux Phase 3)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends bubblewrap libcap-dev python3 curl

      - name: enable unprivileged user namespaces (Linux Phase 3)
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: cargo test (default)
        run: cargo test --all-targets

      - name: cargo test (cancellation feature)
        run: cargo test --features cancellation --all-targets

      # Phase 2 proxy (macOS hard-enforcement) + Phase 3 proxy (Linux bwrap
      # netns + loopback bridge to the allowlist proxy). On Linux the
      # `proxied_non_cooperative_egress_is_blocked` test FAILS (does not
      # skip) if the netns isn't isolating — spec §9 must-enforce guard.
      - name: cargo test (proxy feature)
        run: cargo test --features proxy --all-targets

      - name: cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features
