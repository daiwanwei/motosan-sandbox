name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (no features)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings

      # Linux sandbox tests use Landlock + seccomp only — NO bubblewrap, NO
      # unprivileged-userns / AppArmor sysctls needed (unlike bwrap-based sandboxes).
      # ubuntu-latest's kernel is Landlock-capable, so enforcement runs for real.
      - name: cargo test (default)
        run: cargo test --all-targets

      - name: cargo test (cancellation feature)
        run: cargo test --features cancellation --all-targets

      # Phase 2 proxy: macOS runs the hard-enforcement integration
      # (`proxy_enforcement.rs` — `direct_connection_blocked_by_seatbelt`);
      # Linux exercises the `Error::Unsupported` path
      # (`linux_enforcement.rs::proxied_is_unsupported_on_linux`).
      - name: cargo test (proxy feature)
        run: cargo test --features proxy --all-targets

      - name: cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features
